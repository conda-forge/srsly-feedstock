{% set version = "3.0.0" %}

package:
  name: srsly
  version: {{ version }}

source:
  url: https://github.com/explosion/srsly/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 4490e70cf118c40e254285700a2aafc7a706aecedb749d8ddfa1271127b02640

build:
  number: 0


requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - cython                                 # [build_platform != target_platform]
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools
    - wheel
    - cython
  run:
    - python
    - catalogue >=2.0.3,<2.1.0
    - cloudpickle >=3.1.2,<4
    - msgpack-python >=1.1,<2
    - ruamel.yaml >=0.18.16,<1
    - ujson >=5.11.0,<6

test:
  imports:
    - srsly
    - srsly.tests
  requires:
    - pytest
    - pytz
    - mock
    - numpy >=1.15.0
    - psutil
  commands:
    - python -m pytest --tb=native --pyargs srsly

about:
  home: http://github.com/explosion/srsly
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: Modern high-performance serialization utilities for Python

  doc_url: https://github.com/explosion/srsly
  dev_url: https://github.com/explosion/srsly

extra:
  recipe-maintainers:
    - conda-forge/spacy
